<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>架构舆图 · ArchMap</title>
<style>
:root {
  --paper: #f4efe3;
  --paper-deep: #ece5d3;
  --ink: #2b2620;
  --ink-soft: #6b6358;
  --hairline: #d6ccb6;
  --hairline-deep: #b8ac90;
  --cinnabar: #b5402a;
  --cinnabar-soft: #b5402a22;
  --green: #3a7a4e;
  --green-soft: #3a7a4e1c;
  --amber: #a8761f;
  --amber-soft: #a8761f1f;
  --gray: #97907f;
  --card: #faf7ee;
  --font-display: "Songti SC", "STSong", "SimSun", "NSimSun", serif;
  --font-body: "PingFang SC", "Microsoft YaHei", "DengXian", sans-serif;
  --font-mono: "Cascadia Code", "Consolas", "SF Mono", "Menlo", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  color: var(--ink);
  background:
    radial-gradient(1200px 600px at 80% -10%, #fffdf5cc, transparent 60%),
    radial-gradient(900px 500px at -10% 110%, #e7decb99, transparent 55%),
    var(--paper);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
/* 纸张颗粒 */
body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  opacity: .5;
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer></filter><rect width="160" height="160" filter="url(%23n)"/></svg>');
  z-index: 999;
}

/* ============ 头部 ============ */
header {
  display: flex; align-items: flex-end; gap: 28px;
  padding: 20px 32px 14px;
  border-bottom: 2px solid var(--ink);
  position: relative;
}
header::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -5px;
  border-bottom: 1px solid var(--hairline-deep);
}
.title-block h1 {
  font-family: var(--font-display);
  font-size: 30px; font-weight: 700; letter-spacing: 1px;
}
.title-block .sub {
  font-size: 11px; letter-spacing: 6px; color: var(--ink-soft); margin-top: 2px;
  font-family: var(--font-mono); text-transform: uppercase;
}
.stats { display: flex; gap: 22px; margin-left: auto; padding-bottom: 4px; }
.stat { text-align: right; }
.stat b { font-family: var(--font-display); font-size: 22px; display: block; line-height: 1; }
.stat span { font-size: 11px; color: var(--ink-soft); letter-spacing: 2px; }
.seal {
  font-family: var(--font-display);
  color: #c0402a; border: 3px solid #c0402a;
  width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; letter-spacing: 2px;
  transform: rotate(6deg); border-radius: 6px;
  opacity: .82; mix-blend-mode: multiply;
  text-shadow: 0 0 1px #c0402a55;
  user-select: none; flex-shrink: 0;
  margin-bottom: 2px;
}

/* ============ 主区 ============ */
main { flex: 1; display: flex; min-height: 0; }
#map-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#crumb {
  padding: 12px 32px 0; font-size: 13px; color: var(--ink-soft);
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
#crumb a { color: var(--cinnabar); cursor: pointer; text-decoration: none; border-bottom: 1px dashed var(--cinnabar); }
#crumb .sep { color: var(--hairline-deep); }
#crumb .here { font-family: var(--font-display); font-weight: 700; color: var(--ink); font-size: 15px; }
#map-scroll { flex: 1; overflow: auto; position: relative; }
#map {
  position: relative;
  padding: 22px 32px 70px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 56px 34px;
  align-content: start;
}
#edges { position: absolute; inset: 0; pointer-events: none; overflow: visible; }
#edges .edge { pointer-events: stroke; transition: opacity .15s ease, stroke-width .15s ease; opacity: .55; }
#edges .edge.hot { opacity: 1; stroke-width: 2.2; }
#edges .edge.cold { opacity: .1; }
#edges .elabel {
  font-family: var(--font-body); font-size: 10.5px; fill: #7a3525;
  paint-order: stroke; stroke: var(--paper); stroke-width: 4px; stroke-linejoin: round;
  transition: opacity .15s ease; opacity: .85; pointer-events: none;
}
#edges .elabel.hot { font-weight: 700; opacity: 1; }
#edges .elabel.cold { opacity: .08; }

/* 模块卡:双线框制图风 */
.card {
  position: relative; z-index: 2;
  background: var(--card);
  border: 1px solid var(--ink);
  box-shadow: 0 0 0 1px var(--card), 0 0 0 2px var(--hairline-deep), 3px 4px 0 #2b262014;
  padding: 14px 16px 12px;
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 0 0 1px var(--card), 0 0 0 2px var(--ink), 5px 7px 0 #2b262022; }
.card.selected { outline: 2px solid var(--cinnabar); outline-offset: 3px; }
.card .mid { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); letter-spacing: 1px; }
.card h3 { font-family: var(--font-display); font-size: 19px; margin: 2px 0 6px; display: flex; align-items: baseline; gap: 8px; }
.card .summary { font-size: 12.5px; line-height: 1.65; color: #46403a; min-height: 40px; }
.card .meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
.chip {
  font-size: 11px; padding: 1px 8px; border: 1px solid var(--hairline-deep);
  background: #fffdf6; color: var(--ink-soft); border-radius: 2px;
}
.chip.enter { color: var(--cinnabar); border-color: var(--cinnabar); cursor: pointer; }
.chip.enter:hover { background: var(--cinnabar-soft); }
/* 变化标记 */
.badge {
  position: absolute; top: -11px; right: 10px;
  font-family: var(--font-display); font-size: 12px; font-weight: 700;
  padding: 1px 9px; border-radius: 2px; letter-spacing: 2px;
  color: #fff;
}
.card.added { border-color: var(--green); box-shadow: 0 0 0 1px var(--card), 0 0 0 2px var(--green), 3px 4px 0 #3a7a4e22; background: linear-gradient(#fff0, var(--green-soft)), var(--card); }
.card.added .badge { background: var(--green); }
.card.modified { border-color: var(--amber); box-shadow: 0 0 0 1px var(--card), 0 0 0 2px var(--amber), 3px 4px 0 #a8761f22; background: linear-gradient(#fff0, var(--amber-soft)), var(--card); }
.card.modified .badge { background: var(--amber); }
.card.deprecated { opacity: .5; border-style: dashed; }
.card.deprecated h3 { text-decoration: line-through; text-decoration-color: var(--gray); }
.card.deprecated .badge { background: var(--gray); }
.card.dim-desc { } /* 深层有变化时的指示点 */
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot.green { background: var(--green); } .dot.amber { background: var(--amber); }
@keyframes born { from { transform: scale(.86); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.card.born { animation: born .45s cubic-bezier(.2,.9,.3,1.2) both; }

.empty-hero {
  grid-column: 1/-1; text-align: center; padding: 80px 0; color: var(--ink-soft);
  font-family: var(--font-display); font-size: 18px; letter-spacing: 2px;
}

/* ============ 侧栏 ============ */
#side {
  width: 360px; flex-shrink: 0; overflow-y: auto;
  border-left: 1px solid var(--hairline-deep);
  background: linear-gradient(180deg, #f1ebdc, #ede5d2);
  padding: 18px 20px 30px;
}
.panel { margin-bottom: 22px; }
.panel > h4 {
  font-family: var(--font-display); font-size: 13px; letter-spacing: 4px;
  color: var(--ink-soft); border-bottom: 1px solid var(--hairline-deep);
  padding-bottom: 5px; margin-bottom: 10px; font-weight: 700;
}
.story-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
.story-head .num { font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); }
.story-head .t { font-family: var(--font-display); font-size: 18px; font-weight: 700; }
.kind {
  font-size: 10.5px; padding: 1px 8px; border-radius: 2px; letter-spacing: 1px;
  border: 1px solid; font-family: var(--font-mono);
}
.kind.init { color: var(--ink); border-color: var(--ink); }
.kind.feature { color: var(--green); border-color: var(--green); }
.kind.fix-confirm { color: var(--gray); border-color: var(--gray); }
.kind.refactor { color: var(--amber); border-color: var(--amber); }
.kind.audit { color: #4a6a8a; border-color: #4a6a8a; }
.story-body {
  font-size: 13px; line-height: 1.9; white-space: pre-wrap;
  border-left: 3px solid var(--cinnabar); padding: 4px 0 4px 12px;
  background: #fffdf60f;
}
.commits { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
.commits code {
  font-family: var(--font-mono); font-size: 10.5px; background: #fffdf6;
  border: 1px solid var(--hairline); padding: 1px 6px; color: var(--ink-soft);
}
.change-list { margin-top: 10px; font-size: 12.5px; }
.change-list li { list-style: none; padding: 3px 0; display: flex; gap: 8px; align-items: center; }
.change-list .id-link { cursor: pointer; border-bottom: 1px dashed var(--hairline-deep); }
.change-list .id-link:hover { color: var(--cinnabar); border-color: var(--cinnabar); }
.tag { font-family: var(--font-display); font-size: 11px; font-weight: 700; width: 18px; text-align: center; border-radius: 2px; color: #fff; flex-shrink: 0; }
.tag.a { background: var(--green); } .tag.m { background: var(--amber); } .tag.d { background: var(--gray); } .tag.n { background: var(--hairline-deep); color: var(--ink); }

.detail .name { font-family: var(--font-display); font-size: 20px; font-weight: 700; }
.detail .mid { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); }
.detail .summary { font-size: 13px; line-height: 1.8; margin: 8px 0 12px; }
.kv { font-size: 12px; margin-bottom: 12px; }
.kv .k { color: var(--ink-soft); letter-spacing: 2px; font-size: 11px; display: block; margin-bottom: 4px; }
.kv ul { list-style: none; }
.kv li { padding: 2px 0; }
.kv .anchor { font-family: var(--font-mono); font-size: 11px; color: #46403a; word-break: break-all; }
.kv .rel { display: flex; gap: 6px; align-items: baseline; flex-wrap: wrap; }
.kv .rel .arrow { color: var(--cinnabar); font-family: var(--font-mono); }
.link { color: var(--cinnabar); cursor: pointer; border-bottom: 1px dashed var(--cinnabar); }
.feat-row { display: flex; gap: 8px; align-items: baseline; padding: 5px 0; border-bottom: 1px dashed var(--hairline); cursor: pointer; }
.feat-row:hover .fname { color: var(--cinnabar); }
.feat-row .fname { font-size: 13px; font-weight: 600; flex-shrink: 0; }
.feat-row .fsum { font-size: 11.5px; color: var(--ink-soft); line-height: 1.5; }
.feat-row.gone { opacity: .45; } .feat-row.gone .fname { text-decoration: line-through; }
.feat-group-title { font-size: 11px; color: var(--ink-soft); letter-spacing: 2px; margin: 10px 0 2px; }

/* ============ 时间线 ============ */
footer {
  border-top: 2px solid var(--ink); position: relative;
  background: linear-gradient(0deg, #e9e1cd, #efe8d6);
  padding: 10px 18px 14px;
}
footer::before {
  content: ""; position: absolute; left: 0; right: 0; top: 3px;
  border-top: 1px solid var(--hairline-deep);
}
.tl-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
#play {
  font-family: var(--font-mono); font-size: 13px; width: 34px; height: 28px;
  background: var(--ink); color: var(--paper); border: none; cursor: pointer;
  border-radius: 2px; letter-spacing: 1px;
}
#play:hover { background: var(--cinnabar); }
#slider { flex: 1; accent-color: var(--cinnabar); height: 4px; cursor: pointer; }
.tl-label { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); white-space: nowrap; }
#snaps { display: flex; gap: 10px; overflow-x: auto; padding: 4px 2px 2px; }
.snap {
  flex-shrink: 0; width: 168px; cursor: pointer;
  background: var(--card); border: 1px solid var(--hairline-deep);
  padding: 7px 10px 8px; transition: transform .12s ease;
  position: relative;
}
.snap:hover { transform: translateY(-2px); border-color: var(--ink); }
.snap.current { border: 2px solid var(--cinnabar); box-shadow: 3px 3px 0 #b5402a2e; }
.snap .row1 { display: flex; align-items: center; gap: 6px; }
.snap .n { font-family: var(--font-mono); font-size: 11px; font-weight: 700; }
.snap .d { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); margin-left: auto; }
.snap .t {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.snap .delta { font-family: var(--font-mono); font-size: 10px; margin-top: 2px; display: flex; gap: 8px; }
.snap .delta .ga { color: var(--green); } .snap .delta .gm { color: var(--amber); } .snap .delta .gd { color: var(--gray); }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--hairline-deep); border: 3px solid var(--paper-deep); border-radius: 6px; }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<header>
  <div class="title-block">
    <h1 id="proj-name">—</h1>
    <div class="sub">ARCHMAP · 架构舆图</div>
  </div>
  <div class="stats">
    <div class="stat"><b id="st-mod">0</b><span>模块</span></div>
    <div class="stat"><b id="st-feat">0</b><span>功能</span></div>
    <div class="stat"><b id="st-snap">0</b><span>快照</span></div>
  </div>
  <div class="seal">舆图</div>
</header>

<main>
  <section id="map-pane">
    <div id="crumb"></div>
    <div id="map-scroll">
      <svg id="edges"></svg>
      <div id="map"></div>
    </div>
  </section>
  <aside id="side">
    <div class="panel" id="detail-panel" style="display:none"></div>
    <div class="panel" id="story-panel"></div>
    <div class="panel" id="features-panel"></div>
  </aside>
</main>

<footer>
  <div class="tl-bar">
    <button id="play" title="回放演化">▶</button>
    <span class="tl-label" id="tl-pos"></span>
    <input type="range" id="slider" min="0" max="0" value="0">
    <span class="tl-label" id="tl-date"></span>
  </div>
  <div id="snaps"></div>
</footer>

<script>
const DATA = "__ARCHMAP_DATA__";
const KIND_NAME = { init: '建图', feature: '特性', 'fix-confirm': '确认', refactor: '重构', audit: '审计' };
const REL_NAME = { calls: '调用', depends: '依赖', stores: '存储', notifies: '通知' };

const S = {
  idx: Math.max(0, DATA.snapshots.length - 1), // 当前快照下标
  path: [],          // 下钻路径(模块 id 列表)
  sel: null,         // {type:'module'|'feature', id}
  playing: null,
  prevIdx: null,     // 回放时用于"新出生"动画
};

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function model() { return DATA.models[S.idx] || { modules: [], features: [] }; }
function snap() { return DATA.snapshots[S.idx]; }
function changes() { return snap() ? snap().changes : { added: [], modified: [], deprecated: [] }; }

function findModule(nodes, id) {
  for (const n of nodes) {
    if (n.id === id) return n;
    const r = findModule(n.children, id);
    if (r) return r;
  }
  return null;
}
function moduleById(id) { return findModule(model().modules, id); }
function featureById(id) { return model().features.find((f) => f.id === id) || null; }
function currentLevel() {
  let nodes = model().modules;
  for (const id of S.path) {
    const m = findModule(nodes, id);
    nodes = m ? m.children : [];
  }
  return nodes;
}
function subtreeIds(m) {
  const out = [m.id];
  for (const c of m.children) out.push(...subtreeIds(c));
  return out;
}
function countActive(nodes) {
  let n = 0;
  for (const x of nodes) { if (x.status === 'active') { n++; n += countActive(x.children); } }
  return n;
}
function changeOf(id) {
  const c = changes();
  if (c.added.includes(id)) return 'added';
  if (c.deprecated.includes(id)) return 'deprecated';
  if (c.modified.includes(id)) return 'modified';
  return null;
}
/* 子孙里有没有变化(用于上层指示点) */
function deepChange(m) {
  for (const id of subtreeIds(m).slice(1)) { const c = changeOf(id); if (c) return c; }
  return null;
}
function featuresOfModule(id) { return model().features.filter((f) => f.modules.includes(id)); }

/* ============ 渲染 ============ */
function render(animateNew) {
  renderHeader(); renderCrumb(); renderMap(animateNew); renderTimeline(); renderSide();
  requestAnimationFrame(drawEdges);
}

function renderHeader() {
  $('proj-name').textContent = DATA.project;
  $('st-mod').textContent = countActive(model().modules);
  $('st-feat').textContent = model().features.filter((f) => f.status === 'active').length;
  $('st-snap').textContent = DATA.snapshots.length;
}

function renderCrumb() {
  const parts = ['<a data-jump="-1">全景</a>'];
  S.path.forEach((id, i) => {
    const m = moduleById(id);
    parts.push('<span class="sep">▸</span>');
    parts.push(i === S.path.length - 1
      ? '<span class="here">' + esc(m ? m.name : id) + '</span>'
      : '<a data-jump="' + i + '">' + esc(m ? m.name : id) + '</a>');
  });
  $('crumb').innerHTML = parts.join('');
  $('crumb').querySelectorAll('a').forEach((a) => {
    a.onclick = () => { S.path = S.path.slice(0, +a.dataset.jump + 1); S.sel = null; render(); };
  });
}

function renderMap(animateNew) {
  const level = currentLevel();
  const map = $('map');
  if (!DATA.snapshots.length) {
    map.innerHTML = '<div class="empty-hero">还没有快照——先执行 /archmap-snapshot 完成首次建图</div>';
    return;
  }
  if (!level.length) {
    map.innerHTML = '<div class="empty-hero">此层暂无模块</div>';
    return;
  }
  const prevModel = animateNew && S.prevIdx != null ? DATA.models[S.prevIdx] : null;
  map.innerHTML = level.map((m) => {
    const ch = changeOf(m.id);
    const deep = !ch ? deepChange(m) : null;
    const feats = featuresOfModule(m.id);
    const isNewborn = prevModel && !findModule(prevModel.modules, m.id);
    const badge = ch === 'added' ? '新增' : ch === 'modified' ? '修改' : ch === 'deprecated' ? '废弃' : '';
    return '<div class="card ' + (ch || '') + (isNewborn ? ' born' : '') + (S.sel && S.sel.id === m.id ? ' selected' : '') + '" data-id="' + esc(m.id) + '">' +
      (badge ? '<span class="badge">' + badge + '</span>' : '') +
      '<div class="mid">' + esc(m.id) + '</div>' +
      '<h3>' + esc(m.name) + (deep ? '<span class="dot ' + (deep === 'added' ? 'green' : 'amber') + '" title="内部有变化"></span>' : '') + '</h3>' +
      '<div class="summary">' + esc(m.summary) + '</div>' +
      '<div class="meta">' +
        (m.children.length ? '<span class="chip enter" data-enter="' + esc(m.id) + '">下钻 ▸ ' + m.children.length + ' 个子模块</span>' : '') +
        (feats.length ? '<span class="chip">功能 × ' + feats.length + '</span>' : '') +
        (m.anchors.length ? '<span class="chip" title="' + esc(m.anchors.join('\n')) + '">锚点 × ' + m.anchors.length + '</span>' : '') +
      '</div></div>';
  }).join('');

  map.querySelectorAll('.card').forEach((el) => {
    el.title = '单击查看详情';
    el.onclick = (e) => {
      if (e.target.dataset.enter) return;
      S.sel = S.sel && S.sel.id === el.dataset.id ? null : { type: 'module', id: el.dataset.id };
      render();
      if (S.sel) $('side').scrollTop = 0;
    };
    el.onmouseenter = () => applyEdgeEmphasis(el.dataset.id);
    el.onmouseleave = () => applyEdgeEmphasis(null);
  });
  map.querySelectorAll('[data-enter]').forEach((el) => {
    el.onclick = () => { S.path.push(el.dataset.enter); S.sel = null; render(); };
  });
}

/* 模块间关系连线:正交管线走卡片下方,多条线错开车道 */
function drawEdges() {
  const svg = $('edges');
  const level = currentLevel();
  const scroll = $('map-scroll');
  svg.setAttribute('width', scroll.scrollWidth);
  svg.setAttribute('height', scroll.scrollHeight);
  svg.innerHTML = '<defs><marker id="arr" viewBox="0 0 9 9" refX="7.5" refY="4.5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0.5 L8.5,4.5 L0,8.5 z" fill="#7a3525"/></marker></defs>';
  if (!level.length) return;
  const ids = new Set(level.map((m) => m.id));
  const rectOf = {};
  $('map').querySelectorAll('.card').forEach((el) => {
    const r = el.getBoundingClientRect();
    const base = scroll.getBoundingClientRect();
    rectOf[el.dataset.id] = {
      x: r.left - base.left + scroll.scrollLeft, y: r.top - base.top + scroll.scrollTop,
      w: r.width, h: r.height,
    };
  });
  const edges = [];
  for (const m of level) {
    for (const rel of m.relations || []) {
      if (!ids.has(rel.to) || rel.to === m.id) continue;
      if (rectOf[m.id] && rectOf[rel.to]) edges.push({ from: m.id, fname: m.name, rel });
    }
  }
  // 每个卡片的出/入口横向错位,避免共用同一点
  const portUse = {};
  const port = (id, w) => {
    portUse[id] = (portUse[id] || 0) + 1;
    const k = portUse[id];
    return (k % 2 ? 1 : -1) * Math.ceil(k / 2) * Math.min(26, w / 5);
  };
  const parts = [];
  edges.forEach((e, i) => {
    const a = rectOf[e.from], b = rectOf[e.rel.to];
    const lane = (i % 3) * 13 + 17;            // 车道:行间空隙里错开三层
    const x1 = a.x + a.w / 2 + port(e.from, a.w);
    const x2 = b.x + b.w / 2 + port(e.rel.to, b.w);
    let d, lx, ly;
    if (Math.abs(a.y - b.y) < 24) {            // 同一行:下沉到管线层,平走,再升回
      const y0 = a.y + a.h, laneY = y0 + lane;
      d = 'M' + x1 + ',' + y0 + ' L' + x1 + ',' + laneY + ' L' + x2 + ',' + laneY + ' L' + x2 + ',' + (b.y + b.h);
      lx = (x1 + x2) / 2; ly = laneY - 4;
    } else if (b.y > a.y) {                    // 目标在下方
      const midY = a.y + a.h + lane;
      d = 'M' + x1 + ',' + (a.y + a.h) + ' L' + x1 + ',' + midY + ' L' + x2 + ',' + midY + ' L' + x2 + ',' + b.y;
      lx = (x1 + x2) / 2; ly = midY - 4;
    } else {                                   // 目标在上方
      const midY = b.y + b.h + lane;
      d = 'M' + x1 + ',' + a.y + ' L' + x1 + ',' + midY + ' L' + x2 + ',' + midY + ' L' + x2 + ',' + (b.y + b.h);
      lx = (x1 + x2) / 2; ly = midY - 4;
    }
    const meta = 'data-from="' + esc(e.from) + '" data-to="' + esc(e.rel.to) + '"';
    parts.push('<path class="edge" ' + meta + ' d="' + d + '" fill="none" stroke="#7a3525" stroke-width="1.5" stroke-dasharray="6 4" stroke-linejoin="round" marker-end="url(#arr)"><title>' +
      esc(e.fname + ' ' + (REL_NAME[e.rel.kind] || e.rel.kind) + ' → ' + nodeName(e.rel.to) + ':' + e.rel.summary) + '</title></path>');
    parts.push('<text class="elabel" ' + meta + ' x="' + lx + '" y="' + ly + '" text-anchor="middle">' + esc(REL_NAME[e.rel.kind] || e.rel.kind) + '</text>');
  });
  svg.innerHTML += parts.join('');
  applyEdgeEmphasis(null);
}

/* 悬停/选中卡片时,相关连线高亮、其余淡出 */
function applyEdgeEmphasis(hoverId) {
  const focus = hoverId || (S.sel && S.sel.type === 'module' ? S.sel.id : null);
  $('edges').querySelectorAll('.edge, .elabel').forEach((el) => {
    el.classList.remove('hot', 'cold');
    if (!focus) return;
    if (el.dataset.from === focus || el.dataset.to === focus) el.classList.add('hot');
    else el.classList.add('cold');
  });
}

function renderTimeline() {
  const wrap = $('snaps');
  wrap.innerHTML = DATA.snapshots.map((s, i) => {
    const c = s.changes;
    return '<div class="snap' + (i === S.idx ? ' current' : '') + '" data-i="' + i + '">' +
      '<div class="row1"><span class="n">#' + String(s.snapshot).padStart(4, '0') + '</span>' +
      '<span class="kind ' + esc(s.kind) + '">' + (KIND_NAME[s.kind] || s.kind) + '</span>' +
      '<span class="d">' + esc(s.date) + '</span></div>' +
      '<div class="t" title="' + esc(s.title) + '">' + esc(s.title) + '</div>' +
      '<div class="delta">' +
      (c.added.length ? '<span class="ga">+' + c.added.length + '</span>' : '') +
      (c.modified.length ? '<span class="gm">~' + c.modified.length + '</span>' : '') +
      (c.deprecated.length ? '<span class="gd">−' + c.deprecated.length + '</span>' : '') +
      (!c.added.length && !c.modified.length && !c.deprecated.length ? '<span style="color:var(--gray)">无架构变化</span>' : '') +
      '</div></div>';
  }).join('');
  wrap.querySelectorAll('.snap').forEach((el) => {
    el.onclick = () => gotoSnap(+el.dataset.i);
  });
  const cur = wrap.querySelector('.snap.current');
  if (cur) cur.scrollIntoView({ block: 'nearest', inline: 'nearest' });
  $('slider').max = Math.max(0, DATA.snapshots.length - 1);
  $('slider').value = S.idx;
  $('tl-pos').textContent = DATA.snapshots.length ? (S.idx + 1) + ' / ' + DATA.snapshots.length : '0 / 0';
  $('tl-date').textContent = snap() ? snap().date : '';
}

function renderSide() {
  const s = snap();
  const sp = $('story-panel');
  if (!s) { sp.innerHTML = ''; renderFeatures(); return; }
  const c = s.changes;
  const li = (ids, cls, label) => ids.map((id) =>
    '<li><span class="tag ' + cls + '">' + label + '</span><span class="id-link" data-goto="' + esc(id) + '">' + esc(nodeName(id)) + '</span></li>').join('');
  sp.innerHTML = '<h4>快照纪事</h4>' +
    '<div class="story-head"><span class="num">#' + String(s.snapshot).padStart(4, '0') + ' · ' + esc(s.date) + '</span>' +
    '<span class="kind ' + esc(s.kind) + '">' + (KIND_NAME[s.kind] || s.kind) + '</span></div>' +
    '<div class="story-head"><span class="t">' + esc(s.title) + '</span></div>' +
    '<div class="story-body">' + esc(s.story.trim().replace(/([^\n])\n(?!\n)/g, '$1')) + '</div>' +
    '<ul class="change-list">' +
      li(c.added, 'a', '新') + li(c.modified, 'm', '改') + li(c.deprecated, 'd', '废') +
      (s.no_change || []).map((id) => '<li><span class="tag n">核</span><span>' + esc(nodeName(id)) + ' 确认无变化</span></li>').join('') +
    '</ul>' +
    (s.commits.length ? '<div class="commits">' + s.commits.map((x) => '<code>' + esc(x) + '</code>').join('') + '</div>' : '');
  sp.querySelectorAll('[data-goto]').forEach((el) => {
    el.onclick = () => locate(el.dataset.goto);
  });
  renderDetail();
  renderFeatures();
}

function nodeName(id) {
  const m = moduleById(id); if (m) return m.name;
  const f = featureById(id); if (f) return f.name;
  return id;
}

/* 在地图上定位一个节点:跳到它所在层并选中 */
function pathTo(nodes, id, acc) {
  for (const n of nodes) {
    if (n.id === id) return acc;
    const r = pathTo(n.children, id, acc.concat(n.id));
    if (r) return r;
  }
  return null;
}
function locate(id) {
  const m = moduleById(id);
  if (m) {
    S.path = pathTo(model().modules, id, []) || [];
    S.sel = { type: 'module', id };
  } else if (featureById(id)) {
    S.sel = { type: 'feature', id };
  }
  render();
}

function renderDetail() {
  const dp = $('detail-panel');
  if (!S.sel) { dp.style.display = 'none'; return; }
  dp.style.display = '';
  if (S.sel.type === 'module') {
    const m = moduleById(S.sel.id);
    if (!m) { dp.style.display = 'none'; return; }
    const feats = featuresOfModule(m.id);
    dp.innerHTML = '<h4>模块详情</h4>' +
      '<div class="detail">' +
      '<div class="name">' + esc(m.name) + (m.status === 'deprecated' ? ' <span class="kind fix-confirm">已废弃</span>' : '') + '</div>' +
      '<div class="mid">' + esc(m.id) + sinceText(m.id) + '</div>' +
      '<div class="summary">' + esc(m.summary) + '</div>' +
      kv('辖区锚点', m.anchors.map((a) => '<li class="anchor">' + esc(a) + '</li>')) +
      kv('关系', (m.relations || []).map((r) =>
        '<li class="rel"><span class="arrow">—' + (REL_NAME[r.kind] || r.kind) + '→</span><span class="link" data-goto="' + esc(r.to) + '">' + esc(nodeName(r.to)) + '</span><span style="color:var(--ink-soft)">' + esc(r.summary) + '</span></li>')) +
      kv('承载功能', feats.map((f) =>
        '<li><span class="link" data-goto="' + esc(f.id) + '">' + esc(f.name) + '</span></li>')) +
      '</div>';
  } else {
    const f = featureById(S.sel.id);
    if (!f) { dp.style.display = 'none'; return; }
    dp.innerHTML = '<h4>功能详情</h4>' +
      '<div class="detail">' +
      '<div class="name">' + esc(f.name) + (f.status === 'deprecated' ? ' <span class="kind fix-confirm">已废弃</span>' : '') + '</div>' +
      '<div class="mid">' + esc(f.id) + sinceText(f.id, f.since) + '</div>' +
      '<div class="summary">' + esc(f.summary) + '</div>' +
      kv('落在模块', f.modules.map((id) => '<li><span class="link" data-goto="' + esc(id) + '">' + esc(nodeName(id)) + '</span></li>')) +
      kv('锚点', (f.anchors || []).map((a) => '<li class="anchor">' + esc(a) + '</li>')) +
      '</div>';
  }
  dp.querySelectorAll('[data-goto]').forEach((el) => {
    el.onclick = () => locate(el.dataset.goto);
  });
  dp.querySelectorAll('[data-snap]').forEach((el) => {
    el.onclick = () => gotoSnap(+el.dataset.snap - 1 >= 0 ? DATA.snapshots.findIndex((s) => s.snapshot === +el.dataset.snap) : 0);
  });
}

function sinceText(id, since) {
  const n = since != null ? since : DATA.since[id];
  return n ? ' · 引入于 <span class="link" data-snap="' + n + '">快照 #' + String(n).padStart(4, '0') + '</span>' : '';
}

function kv(label, items) {
  if (!items.length) return '';
  return '<div class="kv"><span class="k">' + label + '</span><ul>' + items.join('') + '</ul></div>';
}

function renderFeatures() {
  const fp = $('features-panel');
  const feats = model().features;
  if (!feats.length) { fp.innerHTML = ''; return; }
  const groups = {};
  for (const f of feats) {
    const key = f.modules[0] || '—';
    (groups[key] = groups[key] || []).push(f);
  }
  fp.innerHTML = '<h4>功能分布</h4>' + Object.entries(groups).map(([mid, fs]) =>
    '<div class="feat-group-title">' + esc(nodeName(mid)) + '</div>' +
    fs.map((f) => '<div class="feat-row' + (f.status === 'deprecated' ? ' gone' : '') + '" data-goto="' + esc(f.id) + '">' +
      '<span class="fname">' + esc(f.name) + '</span><span class="fsum">' + esc(f.summary) + '</span></div>').join('')
  ).join('');
  fp.querySelectorAll('[data-goto]').forEach((el) => {
    el.onclick = () => locate(el.dataset.goto);
  });
}

/* ============ 时间线交互与回放 ============ */
function gotoSnap(i, animate) {
  if (i < 0 || i >= DATA.snapshots.length) return;
  S.prevIdx = S.idx;
  S.idx = i;
  // 切快照后路径里的模块可能还不存在,裁剪到有效前缀
  const valid = [];
  let nodes = model().modules;
  for (const id of S.path) {
    const m = findModule(nodes, id);
    if (!m) break;
    valid.push(id); nodes = m.children;
  }
  S.path = valid;
  if (S.sel && !moduleById(S.sel.id) && !featureById(S.sel.id)) S.sel = null;
  render(animate);
}

$('slider').oninput = (e) => gotoSnap(+e.target.value);
$('play').onclick = () => {
  if (S.playing) { clearInterval(S.playing); S.playing = null; $('play').textContent = '▶'; return; }
  if (S.idx >= DATA.snapshots.length - 1) gotoSnap(0, true);
  $('play').textContent = '⏸';
  S.playing = setInterval(() => {
    if (S.idx >= DATA.snapshots.length - 1) {
      clearInterval(S.playing); S.playing = null; $('play').textContent = '▶'; return;
    }
    gotoSnap(S.idx + 1, true);
  }, 1400);
};
window.addEventListener('resize', () => requestAnimationFrame(drawEdges));
$('map-scroll').addEventListener('scroll', () => requestAnimationFrame(drawEdges));
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') gotoSnap(S.idx - 1);
  if (e.key === 'ArrowRight') gotoSnap(S.idx + 1);
});

document.title = DATA.project + ' · 架构舆图';
render();
</script>
</body>
</html>
